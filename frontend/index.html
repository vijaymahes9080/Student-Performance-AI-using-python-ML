<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeQuest | AI Student Performance Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">GradeQuest</div>
            <h1>Student Performance AI</h1>
            <p>Predict your academic success with advanced Machine Learning</p>
        </header>

        <main class="glass-card">
            <form id="predictionForm">
                <div class="input-group">
                    <label for="attendance">Attendance (%)</label>
                    <input type="number" id="attendance" name="attendance" min="0" max="100" required placeholder="e.g. 85">
                </div>

                <div class="input-group">
                    <label for="internal_marks">Internal Marks (%)</label>
                    <input type="number" id="internal_marks" name="internal_marks" min="0" max="100" required placeholder="e.g. 70">
                </div>

                <div class="input-group">
                    <label for="study_hours">Study Hours (Daily)</label>
                    <input type="number" id="study_hours" name="study_hours" min="0" max="24" step="0.5" required placeholder="e.g. 4.5">
                </div>

                <div class="input-group">
                    <label for="prev_exam_score">Previous Exam Score (%)</label>
                    <input type="number" id="prev_exam_score" name="prev_exam_score" min="0" max="100" required placeholder="e.g. 75">
                </div>

                <button type="submit" id="submitBtn">
                    <span class="btn-text">Predict Result</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div id="resultContainer" class="result-container hidden">
                <div class="result-card">
                    <h2>Prediction Result</h2>
                    <div class="score-circle" id="scoreCircle">
                        <span id="resultValue">--</span>
                        <small id="confidenceValue">0%</small>
                    </div>
                    <p id="resultMessage">Based on your input, you are likely to pass.</p>
                </div>
            </div>
            
            <div id="errorContainer" class="error-container hidden">
                <p id="errorMessage">Something went wrong.</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 GradeQuest System. Final Year Project.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
